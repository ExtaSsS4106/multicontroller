    {% if data.data %}
        {% for d in data.data %}
            <div 
            onclick="location.href='/note/{{d.id}}'"
            data-id={{d.id}} 
            data-user_id={{d.user_id}} 
            class="card">
                <div class="c-info">
                    <div class="c-text">
                    <h2>{{d.title}}</h2>
                    <h6>{{d.file_name}}</h6>
                    </div>
                </div>
                <div class="c-end">
                    <button class="c-btn">
                    
                    </button>
                    <h6>{{d.updated_at}}</h6>
                </div>
            </div>
        {% endfor %}
    {% else %}
        <h1>No notes yeat</h1>
    {% endif %}
