{% extends "main/forms/users/profile/template.html" %}
{% block h_title %}Users{% endblock h_title %}
{% block n_right %}
<button onclick="location.href='/register/'" class="green-btn">
  <span class="btn-icon">New user +</span>
</button>  
{% endblock n_right %} 



{% block content_main %}
    {% if data %}
        {% for d in data %}
            <div 
            onclick="location.href='/user-notes/{{d.user_id}}'"
            data-profile_id={{d.profile_id}} 
            data-user_id={{d.user_id}} 
            class="card">
                <div class="c-info">
                    <div class="c-circle"></div>
                    <div class="c-text">
                    <h2>{{d.username}}</h2>
                    <h6></h6>
                    </div>
                </div>
                <div class="c-end">
                    <button class="c-btn">
                    
                    </button>
                </div>
            </div>
        {% endfor %}
    {% else %}
        <h1>No users</h1>
    {% endif %}
{% endblock content_main %}
