{% extends "main/template.html" %}
{% block h_title %}Registrating{% endblock h_title %}
{% block style %}
<link rel="stylesheet" href="{% static 'main/forms/users/registrating.css' %}">
{% endblock style %}

{% block content %}
<div class="grey-container">
    <div class="reg-title">
        <h2>Registrating user</h2>
    </div>
    <div class="reg-fields">
        <input class="entry" id="username" required placeholder="User name"/>
        <input class="entry" id="email" required placeholder="Email"/>
        <input class="entry" id="first_name" required placeholder="First name"/>
        <input class="entry" id="last_name" required placeholder="Last name"/>
        <input class="entry" id="password" type="password" required placeholder="Password"/>
        <input class="entry" id="password2" type="password" required placeholder="Password again"/>
        <select class="entry" id="role">
            <option value="user">user</option>
            <option value="admin">admin</option>
        </select>
    </div>
    <div class="reg-buttons">
        <button class="red-btn" id="cancel-btn">
            <span class="btn-icon">cancel</span>
        </button>  
        <button class="green-btn" id="register-btn">
            <span class="btn-icon">Registrer</span>
        </button>  
    </div>
</div>
{% endblock content %}

{% block scritp %}
<script>
    document.getElementById('register-btn').addEventListener('click', function() {
        // Получаем значения полей
        const username = document.getElementById('username').value;
        const email = document.getElementById('email').value;
        const firstName = document.getElementById('first_name').value;
        const lastName = document.getElementById('last_name').value;
        const password = document.getElementById('password').value;
        const passwordAgain = document.getElementById('password2').value;
        const role = document.getElementById('role').value;
        
        // Валидация
        if (!username.trim()) {
            alert('Please enter username');
            return;
        }
        
        if (!email.trim()) {
            alert('Please enter email');
            return;
        }
        
        if (!firstName.trim()) {
            alert('Please enter first name');
            return;
        }
        
        if (!lastName.trim()) {
            alert('Please enter last name');
            return;
        }
        
        if (!password) {
            alert('Please enter password');
            return;
        }
        
        if (password !== passwordAgain) {
            alert('Passwords do not match');
            return;
        }
        
        if (password.length < 6) {
            alert('Password must be at least 6 characters');
            return;
        }
        
        // Формируем JSON данные
        const data = {
            username: username,
            password: password,
            password2: passwordAgain,
            email: email,
            first_name: firstName,
            last_name: lastName,
            role: role
        };
        
        // Отправляем запрос
        fetch('/register/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCookie('csrftoken')
            },
            body: JSON.stringify(data)
        })
        .then(response => response.json())
        .then(data => {
            if (data.success || data.status === 'success') {
                alert('Registration successful!');
                window.location.href = '/login/';
            } else if (data.error) {
                alert('Error: ' + data.error);
            } else if (data.errors) {
                const errors = Object.values(data.errors).flat();
                alert('Errors:\n' + errors.join('\n'));
            }
        })
        .catch(error => {
            console.error('Error:', error);
            alert('Registration error. Please try again.');
        });
    });
    
    // Кнопка Cancel
    document.getElementById('cancel-btn').addEventListener('click', function() {
        window.history.back();
    });
    
    // Функция для получения CSRF токена
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }
    
    // Обработка Enter
    document.querySelectorAll('.entry').forEach(input => {
        input.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                document.getElementById('register-btn').click();
            }
        });
    });
</script>
{% endblock scritp %}
